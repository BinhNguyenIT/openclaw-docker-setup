# CLIProxyAPI example config for local Docker deployment
# Copy to mounts/cli-proxy-api/config/config.yaml and edit as needed.

host: "0.0.0.0"
port: 8317

tls:
  enable: false
  cert: ""
  key: ""

remote-management:
  allow-remote: false
  secret-key: "change-me-management-key"
  disable-control-panel: false
  panel-github-repository: "https://github.com/router-for-me/Cli-Proxy-API-Management-Center"

auth-dir: "/root/.cli-proxy-api"

api-keys:
  - "change-me-api-key"

debug: false
pprof:
  enable: false
  addr: "127.0.0.1:8316"

commercial-mode: false
logging-to-file: true
logs-max-total-size-mb: 200
error-logs-max-files: 20
usage-statistics-enabled: true
proxy-url: ""
force-model-prefix: false
passthrough-headers: false
request-retry: 3
max-retry-credentials: 0
max-retry-interval: 30

quota-exceeded:
  switch-project: true
  switch-preview-model: true

routing:
  strategy: "round-robin"

ws-auth: false
nonstream-keepalive-interval: 0

# Add provider credentials below as needed.
# Example sections from upstream project:
# - gemini-api-key
# - codex-api-key
# - claude-api-key
# - openai-compatibility
# - ampcode
