services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.3.8}
    container_name: ${OPENCLAW_GATEWAY_CONTAINER_NAME:-openclaw-gateway}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOME: /home/node
      NODE_ENV: production
      TERM: xterm-256color
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      XDG_CONFIG_HOME: /home/node/.config
    volumes:
      - ${OPENCLAW_ROOT_DIR:-./mounts/openclaw/root}:/home/node/.openclaw
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "${OPENCLAW_GATEWAY_PORT:-18789}",
        "--allow-unconfigured"
      ]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:2026.3.8}
    container_name: ${OPENCLAW_CLI_CONTAINER_NAME:-openclaw-cli}
    profiles: ["tools"]
    env_file:
      - .env
    environment:
      HOME: /home/node
      NODE_ENV: production
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      XDG_CONFIG_HOME: /home/node/.config
    network_mode: "service:openclaw-gateway"
    depends_on:
      openclaw-gateway:
        condition: service_started
    volumes:
      - ${OPENCLAW_ROOT_DIR:-./mounts/openclaw/root}:/home/node/.openclaw
    entrypoint: ["node", "openclaw.mjs"]
    command: ["status"]
    cap_drop:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - no-new-privileges:true

  cli-proxy-api:
    image: ${CLI_PROXY_IMAGE:-eceasy/cli-proxy-api:v6.8.51}
    container_name: ${CLI_PROXY_CONTAINER_NAME:-cli-proxy-api}
    restart: unless-stopped
    environment:
      DEPLOY: ${DEPLOY:-}
    ports:
      - "127.0.0.1:${CLI_PROXY_API_PORT:-8317}:8317"
      - "127.0.0.1:${CLI_PROXY_MANAGEMENT_PORT:-8085}:8085"
      - "127.0.0.1:${CLI_PROXY_PORT_1455:-1455}:1455"
      - "127.0.0.1:${CLI_PROXY_PORT_54545:-54545}:54545"
      - "127.0.0.1:${CLI_PROXY_PORT_51121:-51121}:51121"
      - "127.0.0.1:${CLI_PROXY_PORT_11451:-11451}:11451"
    volumes:
      - ${CLI_PROXY_CONFIG_PATH:-./mounts/cli-proxy-api/config/config.yaml}:/CLIProxyAPI/config.yaml
      - ${CLI_PROXY_AUTH_PATH:-./mounts/cli-proxy-api/auths}:/root/.cli-proxy-api
      - ${CLI_PROXY_LOG_PATH:-./mounts/cli-proxy-api/logs}:/CLIProxyAPI/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8317/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
